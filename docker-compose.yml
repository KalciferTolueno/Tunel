# docker-compose.yml — Despliegue de tunels en Easypanel
#
# Variables de entorno:
#   TUNEL_TOKEN             (obligatorio) secreto compartido
#   TUNEL_ALLOWED_PORTS     (default: 25565,19132,2456,7777,8080)
#
# IMPORTANTE: En Easypanel, ve a la configuración del servicio y activa
# Network Mode → "Host". Esto permite que tunels abra puertos de juego
# dinámicamente. Sin Host mode, solo funcionan puertos mapeados manualmente.
#
# Dashboard: http://IP_DEL_VPS:9001

services:
  tunels:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tunels
    restart: unless-stopped

    volumes:
      - ./certs:/certs:ro

    environment:
      - TUNEL_TOKEN=${TUNEL_TOKEN}
      - TUNEL_ALLOWED_PORTS=${TUNEL_ALLOWED_PORTS:-25565,19132,2456,7777,8080}