# docker-compose.yml — Despliegue de tunels
#
# Variables de entorno:
#   TUNEL_TOKEN             (obligatorio) secreto compartido
#   TUNEL_ALLOWED_PORTS     (default: 25565,19132,2456,7777,8080)
#   DOMAIN                  dominio para label Traefik del dashboard

version: "3.8"

services:
  tunels:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tunels
    network_mode: host
    restart: unless-stopped

    volumes:
      - ./certs:/certs:ro

    environment:
      - TUNEL_TOKEN=${TUNEL_TOKEN}
      - TUNEL_ALLOWED_PORTS=${TUNEL_ALLOWED_PORTS:-25565,19132,2456,7777,8080}

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tunel-dash.rule=Host(`tunel.${DOMAIN}`)"
      - "traefik.http.routers.tunel-dash.entrypoints=websecure"
      - "traefik.http.routers.tunel-dash.tls.certresolver=letsencrypt"
      - "traefik.http.services.tunel-dash.loadbalancer.server.url=http://host.docker.internal:9001"